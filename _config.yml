  硕士研究生毕业于亚利桑大州立大学.主修计算机科学，专修软件工程，数据结构设计，机器学习和数据可视化.致力于成为一个踏实能干以及以解决问题为导向并且拥有丰富实践经验的工程师.拥有善于分析的特质和卓越的领导力.

