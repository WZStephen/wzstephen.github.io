      - 能快速高效地抓住新理念，具有秀的项目管理以及组织能力, 既能团队协作，也能自我导向独立完成工作.
      - 编程语言：<mark>Java</mark> <mark>Python</mark> <mark>JavaScript</mark> <mark>ASP</mark> <mark>MATLAB</mark>
